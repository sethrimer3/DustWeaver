    <path d="M42 46c-7 4-16 3-22-4" stroke-width="2.2" opacity="0.65"/>
  </g>

  <g filter="url(#glow)">
    <circle cx="16" cy="33" r="3.3" fill="#ffe38a"/>
    <circle cx="50" cy="31" r="3.1" fill="#ffd15b"/>
    <circle cx="23" cy="19" r="2.1" fill="#ffefb5"/>
    <circle cx="41" cy="45" r="2.0" fill="#ffc93c"/>
    <circle cx="32" cy="32" r="1.4" fill="#fff4c8" opacity="0.9"/>
